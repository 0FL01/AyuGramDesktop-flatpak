name: Сборка Linux бинарника

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка репозитория
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Отключение swap файла
        run: |
          # Отключаем и удаляем существующий swap
          sudo swapoff -a
          sudo rm -f /swapfile
          
          # Проверим доступную память
          free -h

      - name: Освобождение места на диске
        run: |
          # Удаляем ненужные пакеты и образы
          sudo apt-get remove -y '^ghc-.*' || true
          sudo apt-get remove -y '^dotnet-.*' || true
          sudo apt-get remove -y '^llvm-.*' || true
          sudo apt-get remove -y 'php.*' || true
          sudo apt-get remove -y azure-cli || true
          sudo apt-get remove -y google-chrome-stable || true
          sudo apt-get remove -y google-cloud-sdk || true
          sudo apt-get remove -y firefox || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          
          # Удаляем каталоги, занимающие много места
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          
          # Удаляем кэши Docker
          docker system prune -af
          
          # Показываем доступное пространство
          df -h


      - name: Установка зависимостей
        run: |
          sudo apt-get update
          sudo apt-get install -y curl python3 python3-pip

      - name: Установка poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Подготовка к сборке
        run: |
          ./Telegram/build/prepare/linux.sh
          
          # Создаем директорию out и устанавливаем права
          mkdir -p out
          chmod -R 777 out

      - name: Сборка проекта
        run: |
          docker run --rm -i \
            -v "$PWD:/usr/src/tdesktop" \
            -u $(id -u):$(id -g) \
            ghcr.io/telegramdesktop/tdesktop/centos_env:latest \
            /usr/src/tdesktop/Telegram/build/docker/centos_env/build.sh \
            -D TDESKTOP_API_ID=${{ secrets.TELEGRAM_API_ID }} \
            -D TDESKTOP_API_HASH=${{ secrets.TELEGRAM_API_HASH }}

      - name: Проверка созданных файлов
        run: |
          find out -type f -name "Telegram" -o -name "AyuGram" | sort
          ls -la out/Release/ || true
          ls -la out/ || true
          ls -la out/bin/ || true
          
      - name: Подготовка бинарного файла для загрузки
        run: |
          # Ищем исполняемый файл
          EXECUTABLE=$(find out -type f -name "AyuGram" -o -name "Telegram" | head -n 1)
          if [ -z "$EXECUTABLE" ]; then
            echo "Ошибка: исполняемый файл не найден!"
            exit 1
          fi
          
          echo "Найден исполняемый файл: $EXECUTABLE"
          
          # Создаем папку для выходных файлов
          mkdir -p release
          
          # Копируем бинарник в папку release и переименовываем
          cp "$EXECUTABLE" release/AyuGram-$(git describe --tags --always)-linux-x86_64
          
          # Показываем результат
          ls -la release/

      - name: Загрузка артефактов
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Linux
          path: release/AyuGram-*-linux-x86_64

      - name: Публикация релиза
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/AyuGram-*-linux-x86_64 