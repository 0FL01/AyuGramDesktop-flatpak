name: Сборка Flatpak

# Триггеры для запуска
on:
  # Запускать при push в ветку 'dev'
  push:
    branches:
      - dev
  # Позволяет запускать вручную из интерфейса GitHub
  workflow_dispatch:

jobs:
  # Задача сборки
  build-flatpak:
    # Имя задачи
    name: Собрать Flatpak пакет
    # Запускать на последней версии Ubuntu
    runs-on: ubuntu-latest
    # Шаги выполнения задачи
    steps:
      # 1. Клонируем репозиторий
      - name: Получение исходного кода
        uses: actions/checkout@v4

      # 2. Установка Flatpak и flatpak-builder
      - name: Установка Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      # 3. Настройка репозитория Flathub
      - name: Добавление репозитория Flathub
        run: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      # 4. Установка KDE SDK и Platform для ускорения сборки
      - name: Установка KDE SDK и Platform
        run: flatpak install -y flathub org.kde.Platform//6.7 org.kde.Sdk//6.7

      # 5. Сборка приложения с помощью flatpak-builder
      - name: Запуск сборки Flatpak
        run: flatpak-builder --force-clean --repo=repo build-dir com.ayugram.desktop.yml

      # 6. Создание бандла (.flatpak файла)
      - name: Создание Flatpak бандла
        run: flatpak build-bundle repo ayugram-desktop.flatpak com.ayugram.desktop

      # 7. Загрузка собранного файла как артефакта
      - name: Загрузка артефакта
        uses: actions/upload-artifact@v4
        with:
          name: ayugram-desktop-flatpak
          path: ayugram-desktop.flatpak
