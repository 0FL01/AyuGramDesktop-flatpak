name: Сборка Linux Flatpak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка репозитория
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Отключение swap файла
        run: |
          # Отключаем и удаляем существующий swap
          sudo swapoff -a
          sudo rm -f /swapfile
          
          # Проверим доступную память
          free -h

      - name: Освобождение места на диске
        run: |
          # Удаляем ненужные пакеты и образы
          sudo apt-get remove -y '^ghc-.*' || true
          sudo apt-get remove -y '^dotnet-.*' || true
          sudo apt-get remove -y '^llvm-.*' || true
          sudo apt-get remove -y 'php.*' || true
          sudo apt-get remove -y azure-cli || true
          sudo apt-get remove -y google-chrome-stable || true
          sudo apt-get remove -y google-cloud-sdk || true
          sudo apt-get remove -y firefox || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          
          # Удаляем каталоги, занимающие много места
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          
          # Удаляем кэши Docker
          docker system prune -af
          
          # Показываем доступное пространство
          df -h

      - name: Установка зависимостей Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder elfutils
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          
          # Установка необходимых SDK и рантаймов
          sudo flatpak install -y flathub org.freedesktop.Platform//22.08 org.freedesktop.Sdk//22.08

      - name: Установка зависимостей проекта
        run: |
          sudo apt-get install -y curl python3 python3-pip
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Подготовка к сборке
        run: |
          ./Telegram/build/prepare/linux.sh
          
          # Создаем директорию для Flatpak сборки
          mkdir -p flatpak-build out
          chmod -R 777 flatpak-build out
          
      - name: Сборка проекта
        run: |
          docker run --rm -i \
            -v "$PWD:/usr/src/tdesktop" \
            -u $(id -u):$(id -g) \
            ghcr.io/telegramdesktop/tdesktop/centos_env:latest \
            /usr/src/tdesktop/Telegram/build/docker/centos_env/build.sh \
            -D TDESKTOP_API_ID=${{ secrets.TELEGRAM_API_ID }} \
            -D TDESKTOP_API_HASH=${{ secrets.TELEGRAM_API_HASH }}
            
      - name: Создание Flatpak манифеста
        run: |
          # Создаем desktop файл
          cat > AyuGram.desktop << EOF
          [Desktop Entry]
          Name=AyuGram
          Comment=Unofficial Telegram client with extra features
          TryExec=AyuGram
          Exec=AyuGram -- %u
          Icon=org.telegram.AyuGram
          Terminal=false
          StartupWMClass=AyuGram
          Type=Application
          Categories=Network;InstantMessaging;Qt;
          MimeType=x-scheme-handler/tg;
          Keywords=tg;chat;im;messaging;messenger;sms;tdesktop;
          EOF

          # Подготавливаем директорию out/Release для Flatpak
          mkdir -p out/Release
          # Права 777 здесь избыточны и потенциально небезопасны, 
          # достаточно чтобы пользователь runner имел доступ. 
          # Оставляем для совместимости с вашим кодом, но можно убрать.
          chmod -R 777 out/Release 

          # Копируем desktop файл
          cp AyuGram.desktop out/Release/

          # Находим исполняемый файл и копируем его в out/Release с нужным именем для Flatpak
          # Используем find в корне проекта, т.к. сборка идет туда
          EXECUTABLE=$(find ./out -path '*/Release/AyuGram' -o -path '*/Release/Telegram' | head -n 1)
          if [ -n "$EXECUTABLE" ]; then
            echo "Найден исполняемый файл: $EXECUTABLE"
            # Копируем с именем 'ayugram', которое будет использоваться внутри Flatpak
            cp "$EXECUTABLE" out/Release/ayugram 
            chmod +x out/Release/ayugram
          else
            echo "Исполняемый файл не найден в ./out/*/Release/ !"
            # Выведем структуру папки out для отладки
            echo "Содержимое папки out:"
            find ./out
            exit 1
          fi

          # Указываем ТОЧНЫЙ путь к иконке в вашем репозитории
          ICON_SOURCE=".github/AyuGram.png" 
          # Задаем целевое имя файла иконки, соответствующее App ID
          ICON_DEST_NAME="org.telegram.AyuGram.png"

          if [ -f "$ICON_SOURCE" ]; then
            echo "Копируем иконку: $ICON_SOURCE в out/Release/$ICON_DEST_NAME"
            cp "$ICON_SOURCE" out/Release/"$ICON_DEST_NAME"
          else
            echo "Файл иконки не найден по пути: $ICON_SOURCE"
            echo "Проверка наличия файла:"
            ls -l "$ICON_SOURCE" || echo "Файл действительно отсутствует."
            # Добавим вывод структуры папки .github для отладки, если файл не найден
            echo "Содержимое папки .github/:"
            ls -la .github/ || echo "Папка .github/ не найдена или пуста."
            exit 1 # Завершаем с ошибкой, так как иконка важна
          fi

          # Проверяем содержимое out/Release перед созданием манифеста
          echo "Содержимое out/Release:"
          ls -la out/Release/

          # Создаем Flatpak манифест
          cat > org.telegram.AyuGram.yml << EOF
          app-id: org.telegram.AyuGram
          runtime: org.freedesktop.Platform
          runtime-version: '22.08'
          sdk: org.freedesktop.Sdk
          command: AyuGram # Эта команда будет запускать /app/bin/AyuGram
          finish-args:
            - --share=ipc
            - --share=network
            - --socket=x11
            - --socket=wayland
            - --socket=pulseaudio
            - --filesystem=xdg-pictures
            - --filesystem=xdg-download
            - --filesystem=xdg-music
            - --filesystem=xdg-videos
            - --filesystem=xdg-documents
            - --filesystem=~/.AyuGram:create # Директория для данных приложения
            - --talk-name=org.freedesktop.Notifications
            - --talk-name=org.kde.StatusNotifierWatcher
            - --device=dri # Доступ к графическому ускорению
          modules:
            - name: ayugram
              buildsystem: simple
              build-commands:
                # Файлы из 'sources' (т.е. содержимое out/Release хоста) уже в корне ('./') сборочной среды Flatpak
                - mkdir -p /app/bin # Создаем директорию для бинарника
                # Устанавливаем исполняемый файл из корня среды сборки (куда он был скопирован из out/Release/ayugram)
                - install -Dm755 ayugram /app/bin/AyuGram
                # Устанавливаем desktop файл из корня среды сборки (куда он был скопирован из out/Release/AyuGram.desktop)
                - install -Dm644 AyuGram.desktop /app/share/applications/org.telegram.AyuGram.desktop
                # Устанавливаем иконку 512x512 из корня среды сборки (куда она была скопирована из out/Release/org.telegram.AyuGram.png)
                - install -Dm644 ${ICON_DEST_NAME} /app/share/icons/hicolor/512x512/apps/org.telegram.AyuGram.png
              sources:
                # Эта директива скопирует *содержимое* каталога out/Release хоста в корень ('/') среды сборки Flatpak
                - type: dir
                  path: out/Release # Указываем путь к директории с бинарником, иконкой и desktop-файлом
          EOF

          # Отобразим созданный манифест для отладки
          echo "--- Содержимое org.telegram.AyuGram.yml ---"
          cat org.telegram.AyuGram.yml
          echo "----------------------------------------"

      - name: Сборка Flatpak пакета
        run: |
          flatpak-builder --repo=repo --force-clean flatpak-build org.telegram.AyuGram.yml
          flatpak build-bundle repo AyuGram-$(git describe --tags --always)-linux-x86_64.flatpak org.telegram.AyuGram

      - name: Проверка созданных файлов
        run: |
          ls -la *.flatpak || true
          
      - name: Подготовка файлов для загрузки
        run: |
          # Создаем папку для выходных файлов
          mkdir -p release
          
          # Копируем flatpak в папку release
          cp AyuGram-*.flatpak release/
          
          # Показываем результат
          ls -la release/

      - name: Загрузка артефактов
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Flatpak
          path: release/AyuGram-*.flatpak

      - name: Публикация релиза
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/AyuGram-*.flatpak 