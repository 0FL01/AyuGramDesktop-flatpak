name: Check AyuGram Upstream Updates

on:
  schedule:
    - cron: '0 */12 * * *' # Каждые 12 часов
  workflow_dispatch: # Возможность ручного запуска

jobs:
  check-tags:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    
    steps:
      - name: Get latest tag from upstream
        id: upstream_tag
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getLatestRelease({
              owner: 'AyuGram',
              repo: 'AyuGramDesktop',
            });

            if (!data.tag_name) {
              core.setFailed('Could not fetch latest tag from upstream.');
              return;
            }

            core.info(`Latest upstream tag: ${data.tag_name}`);
            core.setOutput('tag', data.tag_name);

      - name: Check Flatpak release in this repo
        id: check_local
        uses: actions/github-script@v7
        with:
          script: |
            const upstreamTag = '${{ steps.upstream_tag.outputs.tag }}';
            const prefix = `flatpak-${upstreamTag}-`;
            const { owner, repo } = context.repo;

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const matchingRefs = await github.paginate(
              github.rest.git.listMatchingRefs,
              {
                owner,
                repo,
                ref: `tags/${prefix}`,
                per_page: 100,
              });

            const releaseTags = releases
              .map(release => release.tag_name)
              .filter(tag => tag.startsWith(prefix));
            const refTags = matchingRefs
              .map(ref => ref.ref.replace('refs/tags/', ''));
            const tags = [...new Set([...releaseTags, ...refTags])];

            const timestamp = tag => {
              const match = tag.match(/-(\d{14})$/);
              return match ? match[1] : '';
            };
            tags.sort((left, right) => {
              const byTimestamp = timestamp(left).localeCompare(timestamp(right));
              return byTimestamp || left.localeCompare(right);
            });

            const latestTag = tags.at(-1) || '';
            if (!latestTag) {
              core.info(`No Flatpak release tag found for ${upstreamTag}.`);
              core.setOutput('needs_build', 'true');
              return;
            }

            const release = releases.find(item => item.tag_name === latestTag);
            const asset = release?.assets?.find(item => (
              item.state === 'uploaded' && item.name.endsWith('.flatpak')
            ));

            if (release && asset) {
              core.info(`Release ${latestTag} already has Flatpak asset ${asset.name}.`);
              core.setOutput('needs_build', 'false');
              return;
            }

            if (!release) {
              core.warning(`Tag ${latestTag} exists, but GitHub Release is missing.`);
            } else {
              core.warning(`Release ${latestTag} exists, but uploaded .flatpak asset is missing.`);
            }

            core.setOutput('needs_build', 'true');
            core.setOutput('release_tag', latestTag);

      - name: Trigger Build Workflow
        if: steps.check_local.outputs.needs_build == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const inputs = {
              upstream_tag: '${{ steps.upstream_tag.outputs.tag }}',
            };
            const releaseTag = '${{ steps.check_local.outputs.release_tag }}';
            if (releaseTag) {
              inputs.release_tag = releaseTag;
            }

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'flatpak-build.yml',
              ref: 'dev',
              inputs,
            });
