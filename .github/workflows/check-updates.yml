name: Check AyuGram Upstream Updates

on:
  schedule:
    - cron: '0 */12 * * *' # Каждые 12 часов
  workflow_dispatch: # Возможность ручного запуска

jobs:
  check-tags:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    
    steps:
      - name: Get latest tag from upstream
        id: upstream_tag
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/AyuGram/AyuGramDesktop/releases/latest | jq -r .tag_name)
          if [ "$LATEST_TAG" == "null" ] || [ -z "$LATEST_TAG" ]; then
            echo "Error: Could not fetch latest tag from upstream"
            exit 1
          fi
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest upstream tag: $LATEST_TAG"

      - name: Check if tag already exists in our repo
        id: check_local
        run: |
          # Проверяем релизы в нашем репозитории
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/flatpak-${{ steps.upstream_tag.outputs.tag }}-\*")
          
          # Так как наш тег релиза имеет формат flatpak-vX.Y.Z-TIMESTAMP,
          # мы будем искать по списку релизов и проверять наличие префикса.
          
          RELEASES=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases")
          
          EXISTS=$(echo "$RELEASES" | jq -r --arg tag "${{ steps.upstream_tag.outputs.tag }}" \
            '.[] | .tag_name | select(startswith("flatpak-" + $tag))' | head -n 1)

          if [ -n "$EXISTS" ]; then
            echo "Release for $EXISTS already exists. Skipping build."
            echo "needs_build=false" >> $GITHUB_OUTPUT
          else
            echo "New tag detected: ${{ steps.upstream_tag.outputs.tag }}. Triggering build."
            echo "needs_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Build Workflow
        if: steps.check_local.outputs.needs_build == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'flatpak-build.yml',
              ref: 'dev',
              inputs: {
                upstream_tag: '${{ steps.upstream_tag.outputs.tag }}'
              }
            });
