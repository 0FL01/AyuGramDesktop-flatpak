name: Build AyuGram Flatpak (Stable)

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Upstream release tag to build'
        required: true
        type: string
      release_tag:
        description: 'Existing Flatpak release tag to restore, for example flatpak-v6.3.10-20260420135605'
        required: false
        type: string

jobs:
  build-and-release:
    name: Build and Release Flatpak
    runs-on: self-hosted
    permissions:
      contents: write
    timeout-minutes: 1440

    steps:
      - name: Force clean workspace
        run: |
          echo "Forcing workspace cleanup..."
          sudo chown -R $USER:$USER . || true  # Change file ownership
          sudo rm -rf ./* .ccache .git* || true  # Explicitly remove .ccache
          sudo find . -path . -prune -o -exec rm -rf {} + || true  # Additional cleanup

      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0
          persist-credentials: false

      - name: Check runner disk space
        env:
          MIN_FREE_GIB: 24
          RUN_FSTRIM: 1
        run: bash .github/scripts/check-runner-disk-space.sh

      - name: Check GitHub release permission
        env:
          GH_RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/check-github-release-permission.sh

      - name: Prepare upstream release source tree
        run: |
          UPSTREAM_TAG="${{ inputs.upstream_tag }}"
          if [ -z "$UPSTREAM_TAG" ]; then
            echo "::error::workflow_dispatch input upstream_tag is required."
            exit 1
          fi
          UPSTREAM_TAG_REF="refs/tags/upstream/$UPSTREAM_TAG"

          git remote add upstream https://github.com/AyuGram/AyuGramDesktop.git || true

          PRESERVE_BACKUP_ROOT="/tmp/preserve-backup-$$"
          mkdir -p "$PRESERVE_BACKUP_ROOT"
          for path in docs .github README.md; do
            if [ -e "$path" ]; then
              cp -a "$path" "$PRESERVE_BACKUP_ROOT/"
            fi
          done

          bash .github/scripts/ci-retry.sh git fetch upstream --no-tags --no-recurse-submodules \
            "+refs/tags/$UPSTREAM_TAG:$UPSTREAM_TAG_REF"

          if ! git rev-parse -q --verify "$UPSTREAM_TAG_REF^{commit}" >/dev/null; then
            echo "::error::Upstream tag not found: $UPSTREAM_TAG"
            exit 1
          fi

          git checkout --detach "$UPSTREAM_TAG_REF"

          for path in docs .github README.md; do
            if [ -e "$PRESERVE_BACKUP_ROOT/$path" ]; then
              rm -rf "$path"
              cp -a "$PRESERVE_BACKUP_ROOT/$path" "$path"
            fi
          done

      - name: Initialize submodules for upstream release
        run: |
          echo "Syncing and updating git submodules..."
          git submodule sync --recursive
          for attempt in 1 2 3; do
            if git -c submodule.fetchJobs=1 submodule update --init --force --recursive --depth=1; then
              exit 0
            fi
            git config submodule.Telegram/lib_ui.url https://github.com/desktop-app/lib_ui.git
            sleep $((attempt * 20))
          done
          if ! git -c submodule.fetchJobs=1 submodule update --init --force --recursive --depth=1; then
            git config submodule.Telegram/lib_ui.url https://github.com/desktop-app/lib_ui.git
            git -c submodule.fetchJobs=1 submodule update --init --force --recursive
          fi

      - name: "Apply issue #9 Timer range-saturation patch"
        run: |
          python3 --version >/dev/null 2>&1 || sudo dnf install -y python3
          python3 .github/scripts/apply-issue9-timer-fix.py

      - name: Set stable version metadata
        id: get_version
        run: |
          UPSTREAM_TAG="${{ inputs.upstream_tag }}"
          UPSTREAM_TAG_REF="refs/tags/upstream/$UPSTREAM_TAG"
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse "$UPSTREAM_TAG_REF^{commit}")" ]; then
            echo "::error::HEAD is not checked out at tag $UPSTREAM_TAG"
            exit 1
          fi

          APP_VERSION=${UPSTREAM_TAG#v}
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          RELEASE_TAG_INPUT="${{ inputs.release_tag }}"
          if [ -n "$RELEASE_TAG_INPUT" ]; then
            case "$RELEASE_TAG_INPUT" in
              flatpak-${UPSTREAM_TAG}-*)
                RELEASE_TAG="$RELEASE_TAG_INPUT"
                TIMESTAMP="${RELEASE_TAG##*-}"
                ;;
              *)
                echo "::error::release_tag must start with flatpak-${UPSTREAM_TAG}-"
                exit 1
                ;;
            esac

            if ! echo "$TIMESTAMP" | grep -Eq '^[0-9]{14}$'; then
              echo "::error::release_tag must end with a 14 digit timestamp."
              exit 1
            fi
          else
            RELEASE_TAG="flatpak-${UPSTREAM_TAG}-${TIMESTAMP}"
          fi
          UPSTREAM_COMMIT=$(git rev-parse HEAD)

          echo "Upstream tag: ${UPSTREAM_TAG}"
          echo "Application version: ${APP_VERSION}"
          echo "Release tag for this fork: ${RELEASE_TAG}"
          echo "Commit hash: ${UPSTREAM_COMMIT}"

          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
          echo "UPSTREAM_TAG=${UPSTREAM_TAG}" >> $GITHUB_ENV
          echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV
          echo "UPSTREAM_COMMIT=${UPSTREAM_COMMIT}" >> $GITHUB_ENV

      - name: Update metainfo.xml with new release
        run: |
          METAINFO_FILE="docs/assets/flatpak-files/usr/share/metainfo/com.ayugram.desktop.metainfo.xml"
          CURRENT_DATE=$(date +%Y-%m-%d)

          echo "Adding release ${{ env.APP_VERSION }} ($CURRENT_DATE) to $METAINFO_FILE"

          NEW_RELEASE="  <release version=\"${{ env.APP_VERSION }}\" date=\"${CURRENT_DATE}\"><description><p>Automatic Flatpak build from upstream release tag ${{ env.UPSTREAM_TAG }}.</p></description></release>"

          if grep -q "<releases>" "$METAINFO_FILE"; then
            sed -i "s|<releases>|<releases>${NEW_RELEASE}|" "$METAINFO_FILE"
          else
            sed -i "s|</component>|<releases>${NEW_RELEASE}</releases></component>|" "$METAINFO_FILE"
          fi

          echo "metainfo.xml updated"

      - name: Verify that required secrets are set
        run: |
          if [ -z "${{ secrets.TDESKTOP_API_ID }}" ] || [ -z "${{ secrets.TDESKTOP_API_HASH }}" ]; then
            echo "::error:: Required secrets TDESKTOP_API_ID and/or TDESKTOP_API_HASH not found or empty."
            exit 1
          else
            echo "Secrets found successfully."
          fi

      - name: Install dependencies and Flatpak SDK
        run: |
          bash .github/scripts/ci-retry.sh sudo dnf install -y flatpak flatpak-builder python3-pip
          bash .github/scripts/ci-retry.sh pip3 install --user poetry
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          bash .github/scripts/ci-retry.sh flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          bash .github/scripts/ci-retry.sh flatpak install --user -y --noninteractive org.gnome.Sdk//50
          bash .github/scripts/ci-retry.sh flatpak install --user -y --noninteractive org.gnome.Platform//50
  
      - name: Cache TDesktop Dependencies
        id: cache-tdesktop-deps
        uses: actions/cache@v4
        with:
            path: Telegram/ThirdParty
            key: ${{ runner.os }}-tdeps-${{ hashFiles('Telegram/build/prepare/dependencies.txt') }}
  
      - name: Restore Qt6 libraries cache
        id: cache-qt6-restore
        uses: actions/cache/restore@v4
        with:
          path: Libraries/qt6
          key: ${{ runner.os }}-qt6-${{ env.UPSTREAM_TAG }}-${{ hashFiles('Telegram/build/prepare/linux.sh') }}
          restore-keys: |
            ${{ runner.os }}-qt6-${{ env.UPSTREAM_TAG }}-
            ${{ runner.os }}-qt6-
  
      - name: Inspect Qt6 cache (pre-prepare)
        run: |
          echo "Qt6 cache hit: ${{ steps.cache-qt6-restore.outputs.cache-hit }}"
          if [ -d "Libraries/qt6" ]; then
            echo "Qt6 size (pre):"
            du -sh Libraries/qt6 || true
            echo "Qt6 top-level dirs (pre):"
            ls -1d Libraries/qt6/*/ | head -n 10 || true
          else
            echo "Libraries/qt6 not present (pre)"
          fi
  
      - name: Prepare libraries
        run: DEBUG= LTO= JOBS=2 BUILDKIT_MAX_PARALLELISM=2 bash .github/scripts/build-centos-env.sh
  
      - name: Inspect Qt6 cache (post-prepare)
        run: |
          if [ -d "Libraries/qt6" ]; then
            echo "Qt6 size (post):"
            du -sh Libraries/qt6 || true
            echo "Qt6 top-level dirs (post):"
            ls -1d Libraries/qt6/*/ | head -n 10 || true
          else
            echo "Libraries/qt6 not present (post)"
          fi
  
      - name: Announce Qt6 cache save key
        if: steps.cache-qt6-restore.outputs.cache-hit != 'true'
        run: |
          echo "Saving Qt6 cache with key: ${{ steps.cache-qt6-restore.outputs.cache-primary-key }}"
  
      - name: Save Qt6 libraries cache
        if: steps.cache-qt6-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: Libraries/qt6
          key: ${{ steps.cache-qt6-restore.outputs.cache-primary-key }}
  
      - name: Cache ccache data
        uses: actions/cache@v4
        id: cache-ccache
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Check runner disk space before binary build
        env:
          MIN_FREE_GIB: 24
        run: bash .github/scripts/check-runner-disk-space.sh "$PWD/.ccache"
  
      - name: Build AyuGram binary
        env:
          TDESKTOP_API_ID: ${{ secrets.TDESKTOP_API_ID }}
          TDESKTOP_API_HASH: ${{ secrets.TDESKTOP_API_HASH }}
        run: |
          mkdir -p .ccache
          sudo chmod -R 777 .ccache

          docker run --rm \
            --cpus="3" \
            -u root \
            -e TDESKTOP_API_ID \
            -e TDESKTOP_API_HASH \
            -v "$PWD:/usr/src/tdesktop" \
            -v "$PWD/.ccache:/ccache" \
            ghcr.io/telegramdesktop/tdesktop/centos_env:latest \
            /bin/bash /usr/src/tdesktop/.github/scripts/build-tdesktop-binary.sh

      - name: Prepare Flatpak build directory
        run: |
          mkdir -p ayugram-flatpak-build
          cp out/Release/AyuGram ayugram-flatpak-build/
          cp -r docs/assets/flatpak-files/* ayugram-flatpak-build/

      - name: Check runner disk space before Flatpak build
        env:
          MIN_FREE_GIB: 12
        run: bash .github/scripts/check-runner-disk-space.sh "$PWD/ayugram-flatpak-build"

      - name: Build Flatpak package
        working-directory: ./ayugram-flatpak-build
        run: |
          bash ../.github/scripts/build-flatpak-bundle.sh com.ayugram.desktop.yml ayugram-desktop-${{ env.APP_VERSION }}.flatpak com.ayugram.desktop

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: "AyuGram ${{ env.APP_VERSION }} Flatpak (build ${{ env.TIMESTAMP }})"
          body: |
            Automatic Flatpak build for AyuGram version ${{ env.UPSTREAM_TAG }}.
            Built from commit: ${{ env.UPSTREAM_COMMIT }}

            [Original GitHub release](https://github.com/AyuGram/AyuGramDesktop/releases/tag/${{ env.UPSTREAM_TAG }})
          fail_on_unmatched_files: true
          files: ayugram-flatpak-build/ayugram-desktop-${{ env.APP_VERSION }}.flatpak
