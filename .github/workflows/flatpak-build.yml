name: Build AyuGram and Package Flatpak

on:
  # Запускать при пуше в ветку dev
  push:
    branches:
      - dev
  # Позволяет запускать workflow вручную из интерфейса GitHub
  workflow_dispatch:

jobs:
  # Единственное задание, которое будет выполнять все шаги
  build-and-package-flatpak:
    # Запускаем на последней версии Ubuntu, предоставляемой GitHub
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Клонирование репозитория с workflow и манифестом
      - name: Checkout packaging repository
        uses: actions/checkout@v4

      # Шаг 2: Освобождение места на диске раннера
      - name: Free up disk space on runner
        run: |
          echo "Дисковое пространство до очистки:"
          df -h
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          docker image prune -a -f
          echo "Дисковое пространство после очистки:"
          df -h

      # НОВЫЙ ШАГ: Клонируем исходный код AyuGram, как в ручной инструкции
      # Это создает необходимую директорию 'tdesktop'
      - name: Clone AyuGram Source Code
        run: |
          git clone --recursive https://github.com/AyuGram/AyuGramDesktop.git tdesktop

      # Шаг 4: Установка Python и Poetry
      - name: Setup Python and Poetry
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Poetry
        run: pip install poetry

      # Шаг 5: Подготовка сборочного окружения
      # Теперь эта команда будет работать, так как директория tdesktop существует
      - name: Prepare build environment
        run: ./Telegram/build/prepare/linux.sh
        working-directory: ./tdesktop

      # Шаг 6: Сборка AyuGram с помощью Docker
      - name: Build AyuGram binary
        run: |
          docker run --rm -i \
              -u $(id -u) \
              -v "$PWD:/usr/src/tdesktop" \
              ghcr.io/telegramdesktop/tdesktop/centos_env:latest \
              /usr/src/tdesktop/Telegram/build/docker/centos_env/build.sh \
              -D TDESKTOP_API_ID=${{ secrets.API_ID }} \
              -D TDESKTOP_API_HASH=${{ secrets.API_HASH }}
        working-directory: ./tdesktop

      # Шаг 7: Подготовка файлов для упаковки в Flatpak
      - name: Prepare files for Flatpak packaging
        run: |
          mkdir flatpak_build_dir
          cp com.ayugram.desktop.yaml flatpak_build_dir/
          mkdir -p flatpak_build_dir/ayugram-desktop/usr/bin
          mv tdesktop/out/Telegram flatpak_build_dir/ayugram-desktop/usr/bin/ayugram-desktop
          cp -r tdesktop/out/* flatpak_build_dir/ayugram-desktop/
          mkdir flatpak_build_dir/bundled-libs

      # Шаг 8: Сборка Flatpak-бандла
      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak_build_dir/com.ayugram.desktop.yaml
          bundle: ayugram.flatpak
          repo-path: repo
          cache: true
          cache-key: flatpak-cache-${{ github.sha }}

      # Шаг 9: Загрузка артефакта
      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: ayugram-flatpak-bundle
          path: ayugram.flatpak