name: Build AyuGram Flatpak (Feature Branch)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'ads-key'
      commit_message:
        description: 'Commit/message for release'
        required: false
        default: 'Feature branch build'

jobs:
  build-feature:
    name: Build Flatpak from Feature Branch
    runs-on: self-hosted
    permissions:
      contents: write
    timeout-minutes: 1440

    steps:
      - name: Force clean workspace
        run: |
          echo "Forcing workspace cleanup..."
          sudo chown -R $USER:$USER . || true
          sudo rm -rf ./* .ccache .git* || true
          sudo find . -path . -prune -o -exec rm -rf {} + || true

      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'ads-key' }}
          submodules: false
          fetch-depth: 0
          persist-credentials: false

      - name: Setup git
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Initialize submodules for feature branch
        run: |
          echo "Syncing and updating git submodules..."
          git submodule sync --recursive
          for attempt in 1 2 3; do
            if git -c submodule.fetchJobs=1 submodule update --init --force --recursive --depth=1; then
              exit 0
            fi
            git config submodule.Telegram/lib_ui.url https://github.com/desktop-app/lib_ui.git
            sleep $((attempt * 20))
          done
          if ! git -c submodule.fetchJobs=1 submodule update --init --force --recursive --depth=1; then
            git config submodule.Telegram/lib_ui.url https://github.com/desktop-app/lib_ui.git
            git -c submodule.fetchJobs=1 submodule update --init --force --recursive
          fi

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.TDESKTOP_API_ID }}" ] || [ -z "${{ secrets.TDESKTOP_API_HASH }}" ]; then
            echo "::error:: Required secrets TDESKTOP_API_ID and/or TDESKTOP_API_HASH not found."
            exit 1
          fi

      - name: Install dependencies
        run: |
          bash .github/scripts/ci-retry.sh sudo dnf install -y flatpak flatpak-builder python3-pip
          bash .github/scripts/ci-retry.sh pip3 install --user poetry
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          bash .github/scripts/ci-retry.sh flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          bash .github/scripts/ci-retry.sh flatpak install --user -y --noninteractive org.gnome.Sdk//50
          bash .github/scripts/ci-retry.sh flatpak install --user -y --noninteractive org.gnome.Platform//50

      - name: Set feature version metadata
        id: version
        run: |
          APP_VERSION=$(awk '$1=="AppVersionStr"{print $2}' Telegram/build/version)
          if [ -z "$APP_VERSION" ]; then
            echo "::error::Failed to read AppVersionStr from Telegram/build/version"
            exit 1
          fi
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          BRANCH_NAME=${{ inputs.branch || 'ads-key' }}
          FEATURE_TAG="feature-${BRANCH_NAME}-${TIMESTAMP}"
          
          echo "Building from branch: ${BRANCH_NAME}"
          echo "Source version: ${APP_VERSION}"
          echo "Feature tag: ${FEATURE_TAG}"
          
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
          echo "FEATURE_TAG=${FEATURE_TAG}" >> $GITHUB_ENV
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: Telegram/ThirdParty
          key: ${{ runner.os }}-tdeps-${{ hashFiles('Telegram/build/prepare/dependencies.txt') }}

      - name: Restore Qt6 cache
        id: cache-qt6
        uses: actions/cache/restore@v4
        with:
          path: Libraries/qt6
          key: ${{ runner.os }}-qt6-${{ env.APP_VERSION }}-${{ hashFiles('Telegram/build/prepare/linux.sh') }}
          restore-keys: |
            ${{ runner.os }}-qt6-${{ env.APP_VERSION }}-
            ${{ runner.os }}-qt6-

      - name: Prepare libraries
        run: DEBUG= LTO= JOBS=2 BUILDKIT_MAX_PARALLELISM=2 bash .github/scripts/build-centos-env.sh

      - name: Save Qt6 cache
        if: steps.cache-qt6.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: Libraries/qt6
          key: ${{ steps.cache-qt6.outputs.cache-primary-key }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Build AyuGram binary
        env:
          TDESKTOP_API_ID: ${{ secrets.TDESKTOP_API_ID }}
          TDESKTOP_API_HASH: ${{ secrets.TDESKTOP_API_HASH }}
        run: |
          mkdir -p .ccache
          sudo chmod -R 777 .ccache

          docker run --rm \
            --cpus="3" \
            -u root \
            -e TDESKTOP_API_ID \
            -e TDESKTOP_API_HASH \
            -v "$PWD:/usr/src/tdesktop" \
            -v "$PWD/.ccache:/ccache" \
            ghcr.io/telegramdesktop/tdesktop/centos_env:latest \
            /bin/bash /usr/src/tdesktop/.github/scripts/build-tdesktop-binary.sh

      - name: Verify binary exists
        run: |
          if [ ! -f "out/Release/AyuGram" ]; then
            echo "::error:: Binary not found at out/Release/AyuGram"
            exit 1
          fi
          ls -la out/Release/AyuGram

      - name: Prepare Flatpak build directory
        run: |
          mkdir -p ayugram-feature-build
          cp out/Release/AyuGram ayugram-feature-build/
          cp -r docs/assets/flatpak-files-feature/* ayugram-feature-build/

      - name: Build Flatpak package
        working-directory: ./ayugram-feature-build
        run: |
          bash ../.github/scripts/build-flatpak-bundle.sh com.ayugram.desktop.feature.yml ayugram-desktop-feature-${{ env.APP_VERSION }}.flatpak com.ayugram.desktop.feature

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FEATURE_TAG }}
          target_commitish: ${{ inputs.branch || 'ads-key' }}
          name: "AyuGram ${{ env.APP_VERSION }} Flatpak (Feature: ${{ env.BRANCH_NAME }})"
          body: |
            Feature branch flatpak build.

            Branch: ${{ env.BRANCH_NAME }}
            Base version: ${{ env.APP_VERSION }}
            
            ${{ inputs.commit_message || 'Feature branch build' }}
          fail_on_unmatched_files: true
          files: ayugram-feature-build/ayugram-desktop-feature-${{ env.APP_VERSION }}.flatpak
