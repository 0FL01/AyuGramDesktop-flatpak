name: Build AyuGram Flatpak (Feature Branch)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'ads-key'
      commit_message:
        description: 'Commit/message for release'
        required: false
        default: 'Feature branch build'

jobs:
  build-feature:
    name: Build Flatpak from Feature Branch
    runs-on: self-hosted
    permissions:
      contents: write
    timeout-minutes: 1440

    steps:
      - name: Force clean workspace
        run: |
          echo "Forcing workspace cleanup..."
          sudo chown -R $USER:$USER . || true
          sudo rm -rf ./* .ccache .git* || true
          sudo find . -path . -prune -o -exec rm -rf {} + || true

      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'ads-key' }}
          submodules: 'recursive'
          fetch-depth: 0
          persist-credentials: false

      - name: Setup git
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.TDESKTOP_API_ID }}" ] || [ -z "${{ secrets.TDESKTOP_API_HASH }}" ]; then
            echo "::error:: Required secrets TDESKTOP_API_ID and/or TDESKTOP_API_HASH not found."
            exit 1
          fi

      - name: Install dependencies
        run: |
          sudo dnf install -y flatpak flatpak-builder python3-pip
          pip3 install --user poetry
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y --noninteractive org.gnome.Sdk//50 || true
          flatpak install --user -y --noninteractive org.gnome.Platform//50 || true

      - name: Get upstream version
        id: version
        run: |
          # Add upstream and get latest tag
          git remote add upstream https://github.com/AyuGram/AyuGramDesktop.git || true
          git fetch upstream --tags --no-recurse-submodules || true
          
          LATEST_TAG=$(git describe --tags --abbrev=0 upstream/dev 2>/dev/null || echo "v0.0.0")
          APP_VERSION=${LATEST_TAG#v}
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          BRANCH_NAME=${{ inputs.branch || 'ads-key' }}
          FEATURE_TAG="feature-${BRANCH_NAME}-${TIMESTAMP}"
          
          echo "Building from branch: ${BRANCH_NAME}"
          echo "Base version: ${LATEST_TAG}"
          echo "Feature tag: ${FEATURE_TAG}"
          
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
          echo "FEATURE_TAG=${FEATURE_TAG}" >> $GITHUB_ENV
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: Telegram/ThirdParty
          key: ${{ runner.os }}-tdeps-${{ hashFiles('Telegram/build/prepare/dependencies.txt') }}

      - name: Restore Qt6 cache
        id: cache-qt6
        uses: actions/cache/restore@v4
        with:
          path: Libraries/qt6
          key: ${{ runner.os }}-qt6-${{ env.APP_VERSION }}-${{ hashFiles('Telegram/build/prepare/linux.sh') }}
          restore-keys: |
            ${{ runner.os }}-qt6-${{ env.APP_VERSION }}-
            ${{ runner.os }}-qt6-

      - name: Prepare libraries
        run: ./Telegram/build/prepare/linux.sh

      - name: Save Qt6 cache
        if: steps.cache-qt6.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: Libraries/qt6
          key: ${{ steps.cache-qt6.outputs.cache-primary-key }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Build AyuGram binary
        env:
          TDESKTOP_API_ID: ${{ secrets.TDESKTOP_API_ID }}
          TDESKTOP_API_HASH: ${{ secrets.TDESKTOP_API_HASH }}
        run: |
          mkdir -p .ccache
          sudo chmod -R 777 .ccache

          docker run --rm \
            --cpus="3" \
            -u root \
            -v "$PWD:/usr/src/tdesktop" \
            -v "$PWD/.ccache:/ccache" \
            ghcr.io/telegramdesktop/tdesktop/centos_env:latest \
            /bin/bash -c "dnf install -y ccache && \
                          export PATH=/usr/lib64/ccache:\$PATH && \
                          export CCACHE_DIR=/ccache && \
                          export CCACHE_BASEDIR=/usr/src/tdesktop && \
                          export CCACHE_COMPRESS=1 && \
                          export CC='ccache gcc' && \
                          export CXX='ccache g++' && \
                          /usr/src/tdesktop/Telegram/build/docker/centos_env/build.sh \
                            -D TDESKTOP_API_ID=${TDESKTOP_API_ID} \
                            -D TDESKTOP_API_HASH=${TDESKTOP_API_HASH} \
                            -D USE_CCACHE=ON && \
                          ccache -s"

      - name: Verify binary exists
        run: |
          if [ ! -f "out/Release/AyuGram" ]; then
            echo "::error:: Binary not found at out/Release/AyuGram"
            exit 1
          fi
          ls -la out/Release/AyuGram

      - name: Prepare Flatpak build directory
        run: |
          mkdir -p ayugram-feature-build
          cp out/Release/AyuGram ayugram-feature-build/
          cp -r docs/assets/flatpak-files-feature/* ayugram-feature-build/

      - name: Build Flatpak package
        working-directory: ./ayugram-feature-build
        run: |
          rm -rf repo build-dir
          flatpak-builder --repo=repo --force-clean --disable-rofiles-fuse build-dir com.ayugram.desktop.feature.yml
          flatpak build-bundle repo ayugram-desktop-feature-${{ env.APP_VERSION }}.flatpak com.ayugram.desktop.feature

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FEATURE_TAG }}
          target_commitish: ${{ inputs.branch || 'ads-key' }}
          name: "AyuGram ${{ env.APP_VERSION }} Flatpak (Feature: ${{ env.BRANCH_NAME }})"
          body: |
            Feature branch flatpak build.

            Branch: ${{ env.BRANCH_NAME }}
            Base version: ${{ env.APP_VERSION }}
            
            ${{ inputs.commit_message || 'Feature branch build' }}
          fail_on_unmatched_files: true
          files: ayugram-feature-build/ayugram-desktop-feature-${{ env.APP_VERSION }}.flatpak
