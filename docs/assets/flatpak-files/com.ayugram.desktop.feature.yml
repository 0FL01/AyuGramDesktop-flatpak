app-id: com.ayugram.desktop.feature

runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk

command: ayugram-desktop

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all
  - --share=network
  - --filesystem=xdg-download
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.gnome.Mutter.IdleMonitor
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=com.canonical.indicator.application
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.OpenURI
  - --talk-name=org.freedesktop.portal.FileChooser
  - --talk-name=org.sigxcpu.Feedback

modules:
  - name: ayugram-feature-repack
    buildsystem: simple
    build-commands:
      - sed -i 's|^Exec=.*|Exec=ayugram-desktop -- %u|' usr/share/applications/com.ayugram.desktop.feature.desktop
      - sed -i 's|^Exec=.*|Exec=/app/bin/ayugram-desktop|' usr/share/dbus-1/services/com.ayugram.desktop.feature.service
      - install -d /app/share/
      - install -Dm755 AyuGram /app/bin/ayugram-desktop
      - cp -a usr/share/* /app/share/

    sources:
      - type: dir
        path: .
