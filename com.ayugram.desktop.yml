# Идентификатор приложения
app-id: com.ayugram.desktop

# Среда выполнения и SDK от KDE, т.к. они содержат много полезных зависимостей
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk

# Команда для запуска
command: ayugram-desktop

# Настройка песочницы
finish-args:
  # --- Переменные окружения ---
  - --env=LD_LIBRARY_PATH=/app/lib
  - --env=PATH=/app/bin:/app/lib/webkit2gtk-4.0:/usr/bin
  - --env=XDG_DATA_DIRS=/app/share:/usr/share
  
  # --- Доступ к сокетам ---
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio

  # --- Доступ к системным службам (D-Bus) ---
  - --own-name=com.ayugram.desktop
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher 
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.OpenURI
  - --talk-name=org.freedesktop.portal.FileChooser

  # --- Прочие разрешения ---
  - --share=ipc
  - --device=dri
  - --share=network
  - --filesystem=xdg-download

# Модули для сборки
modules:
  - name: ayugram-repack
    buildsystem: simple
    build-commands:

      - sed -i 's|^Exec=.*|Exec=/app/bin/ayugram-desktop -- %%u|' ayugram-desktop/usr/share/applications/com.ayugram.desktop.desktop
      - sed -i 's|^Exec=.*|Exec=/app/bin/ayugram-desktop|' ayugram-desktop/usr/share/dbus-1/services/com.ayugram.desktop.service
      # Создаем директорию /app/lib внутри контейнера
      - install -d /app/lib/
      # Создаем директорию для общих ресурсов (иконки, .desktop файлы)
      - install -d /app/share/
      
      # Копируем все наши библиотеки и их поддиректории в /app/lib
      # Флаг -a (archive) важен для сохранения символических ссылок
      - cp -a bundled-libs/* /app/lib/
      
      # Копируем само приложение и его ресурсы
      - install -Dm755 ayugram-desktop/usr/bin/ayugram-desktop /app/bin/ayugram-desktop
      - cp -a ayugram-desktop/usr/share/* /app/share/

    # Источник - вся текущая директория
    sources:
      - type: dir
        path: .